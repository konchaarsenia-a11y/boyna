<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Маршрут — Бойня</title>
  <style>
    :root {
      --safe-bottom: max(16px, env(safe-area-inset-bottom, 0px));
    }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #121212; color: #f5f5f7; padding: 20px;
      padding-bottom: calc(24px + var(--safe-bottom));
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    .sub { color: #8e8e93; font-size: 14px; margin-bottom: 16px; }
    .addr {
      background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 8px; font-size: 15px; line-height: 1.35;
    }
    .addr a { color: #248bf2; text-decoration: none; }
    .btn {
      display: block; width: 100%; height: 52px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 12px;
    }
    .btn-main { background: #30d158; color: #052e12; }
    .btn-sec { background: #2c2c2e; color: #fff; }
    .err { color: #ff453a; }
  </style>
</head>
<body>
  <h1>Маршрут доставки</h1>
  <p class="sub" id="sub">Загрузка адресов…</p>
  <div id="list"></div>
  <button class="btn btn-main" id="btnRoute" type="button">Построить маршрут в Яндекс.Картах</button>
  <button class="btn btn-sec" id="btnCopy" type="button">Скопировать адреса</button>

  <script>
    function parseAddrs() {
      try {
        if (location.hash && location.hash.length > 1) {
          return decodeURIComponent(location.hash.slice(1)).split("|").map(function (s) { return s.trim(); }).filter(Boolean);
        }
      } catch (e) {}
      try {
        var q = new URLSearchParams(location.search).get("a");
        if (q) return q.split("|").map(function (s) { return s.trim(); }).filter(Boolean);
      } catch (e2) {}
      return [];
    }

    function buildYandexUrl(addrs) {
      var u = new URL("https://yandex.ru/maps/");
      u.searchParams.set("mode", "routes");
      u.searchParams.set("rtt", "auto");
      // Без ведущего ~ — так веб и приложение лучше понимают текстовые адреса
      u.searchParams.set("rtext", addrs.join("~"));
      return u.toString();
    }

    function buildSingleUrl(addr) {
      var u = new URL("https://yandex.ru/maps/");
      u.searchParams.set("text", addr);
      return u.toString();
    }

    var addrs = parseAddrs();
    var list = document.getElementById("list");
    var sub = document.getElementById("sub");

    if (!addrs.length) {
      sub.className = "sub err";
      sub.textContent = "Адреса не переданы. Откройте кнопку из вкладки «Курьер» в мини-аппе.";
      document.getElementById("btnRoute").disabled = true;
      document.getElementById("btnCopy").disabled = true;
    } else {
      sub.textContent = "Точек: " + addrs.length + ". Нажмите кнопку ниже — откроется маршрут с адресами.";
      list.innerHTML = addrs.map(function (a, i) {
        return '<div class="addr">' + (i + 1) + ". <a href=\"" + buildSingleUrl(a).replace(/"/g, "&quot;") + "\">" +
          a.replace(/&/g, "&amp;").replace(/</g, "&lt;") + "</a></div>";
      }).join("");
    }

    document.getElementById("btnRoute").onclick = function () {
      if (!addrs.length) return;
      // Переход из обычного браузера — Яндекс подхватывает текстовые адреса
      location.href = buildYandexUrl(addrs);
    };

    document.getElementById("btnCopy").onclick = function () {
      var text = addrs.map(function (a, i) { return (i + 1) + ". " + a; }).join("\n");
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () {
          sub.textContent = "Адреса скопированы";
        }).catch(function () {
          prompt("Скопируйте адреса:", text);
        });
      } else {
        prompt("Скопируйте адреса:", text);
      }
    };

    // Автопереход можно включить, но надёжнее кнопка (жест пользователя)
  </script>
</body>
</html>
